openapi: 3.1.0
info:
  title: dotCMS REST Authentication Navigation API
  description: REST API for the dotCMS content management platform. Provides endpoints for authentication, content, workflow, search, navigation, sites, and user management. Endpoints derived from public dotCMS documentation at https://dev.dotcms.com/docs — best-effort, not exhaustive. Each dotCMS installation hosts its own API; substitute the demo base URL with your deployment's host.
  version: '1'
  contact:
    name: dotCMS
    url: https://www.dotcms.com
  license:
    name: Proprietary
servers:
- url: https://demo.dotcms.com
  description: dotCMS demo
security:
- BearerAuth: []
- BasicAuth: []
tags:
- name: Navigation
paths:
  /api/v1/nav/{path}:
    get:
      tags:
      - Navigation
      summary: Get navigation tree
      operationId: getNavigation
      parameters:
      - in: path
        name: path
        required: true
        schema:
          type: string
      - in: query
        name: depth
        schema:
          type: integer
          default: 1
      responses:
        '200':
          description: OK
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    BasicAuth:
      type: http
      scheme: basic
